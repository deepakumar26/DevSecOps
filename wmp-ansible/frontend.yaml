---
- name: Install and deploy frontend application with Nginx
  hosts: all
  become: true
  gather_facts: true

  vars:
    node_setup_url: "https://rpm.nodesource.com/setup_22.x"
    node_setup_script: "/tmp/nodesource_setup_22.sh"

    frontend_archive_url: >-
      https://raw.githubusercontent.com/raghudevopsb88/wealth-project/main/artifacts/frontend.tar.gz

    frontend_build_dir: "/opt/wmp-frontend"
    nginx_document_root: "/usr/share/nginx/html"

    # The local nginx.conf must contain only a server {} block.
    nginx_local_config: "nginx.conf"
    nginx_config_destination: "/etc/nginx/conf.d/frontend.conf"

  tasks:
    # ============================================================
    # Node.js repository configuration
    # ============================================================

    - name: Download NodeSource repository setup script
      ansible.builtin.get_url:
        url: "{{ node_setup_url }}"
        dest: "{{ node_setup_script }}"
        mode: "0755"
      register: node_setup_download

    - name: Display NodeSource script download result
      ansible.builtin.debug:
        msg:
          - "NodeSource script changed: {{ node_setup_download.changed }}"
          - "NodeSource script location: {{ node_setup_script }}"

    - name: Configure Node.js 22 repository
      ansible.builtin.command:
        cmd: "bash {{ node_setup_script }}"
      register: node_repository_result
      changed_when: true
      failed_when: false

    - name: Display Node.js repository configuration output
      ansible.builtin.debug:
        msg:
          - "Return code: {{ node_repository_result.rc }}"
          - "STDOUT:"
          - "{{ node_repository_result.stdout_lines | default([]) }}"
          - "STDERR:"
          - "{{ node_repository_result.stderr_lines | default([]) }}"

    - name: Fail when Node.js repository configuration fails
      ansible.builtin.assert:
        that:
          - node_repository_result.rc == 0
        fail_msg: >-
          NodeSource repository configuration failed.
          Review the output printed above.
        success_msg: "NodeSource repository configured successfully."

    # ============================================================
    # Package installation
    # ============================================================

    - name: Install Nginx and Node.js
      ansible.builtin.dnf:
        name:
          - nginx
          - nodejs
        state: present
        update_cache: true
      register: package_install_result

    - name: Display package installation result
      ansible.builtin.debug:
        msg:
          - "Package installation changed: {{ package_install_result.changed }}"
          - "Installed packages: nginx, nodejs"

    - name: Check installed software versions
      ansible.builtin.shell: |
        set -o pipefail
        echo "Node.js version:"
        node --version
        echo
        echo "NPM version:"
        npm --version
        echo
        echo "Nginx version:"
        nginx -v 2>&1
      args:
        executable: /bin/bash
      register: software_versions
      changed_when: false
      failed_when: false

    - name: Display installed software versions
      ansible.builtin.debug:
        var: software_versions.stdout_lines

    - name: Fail when required software is unavailable
      ansible.builtin.assert:
        that:
          - software_versions.rc == 0
        fail_msg: >-
          Node.js, NPM, or Nginx verification failed.
          STDERR: {{ software_versions.stderr | default('No stderr') }}
        success_msg: "Node.js, NPM, and Nginx are installed."

    # ============================================================
    # Download frontend source code
    # ============================================================

    - name: Remove previous frontend build directory
      ansible.builtin.file:
        path: "{{ frontend_build_dir }}"
        state: absent

    - name: Create frontend build directory
      ansible.builtin.file:
        path: "{{ frontend_build_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download and extract frontend application
      ansible.builtin.unarchive:
        src: "{{ frontend_archive_url }}"
        dest: "{{ frontend_build_dir }}"
        remote_src: true
      register: frontend_extract_result

    - name: Display frontend extraction result
      ansible.builtin.debug:
        msg:
          - "Frontend archive extracted: {{ frontend_extract_result.changed }}"
          - "Frontend build directory: {{ frontend_build_dir }}"

    - name: Verify package.json exists
      ansible.builtin.stat:
        path: "{{ frontend_build_dir }}/package.json"
      register: package_json

    - name: Fail when package.json is missing
      ansible.builtin.assert:
        that:
          - package_json.stat.exists
        fail_msg: >-
          package.json was not found at
          {{ frontend_build_dir }}/package.json.
          Check the directory structure inside frontend.tar.gz.
        success_msg: "package.json found."

    # ============================================================
    # Frontend build
    # ============================================================

    - name: Install frontend dependencies using npm ci
      ansible.builtin.command:
        cmd: npm ci
        chdir: "{{ frontend_build_dir }}"
      register: npm_ci_result
      changed_when: npm_ci_result.rc == 0
      failed_when: false
      environment:
        NODE_ENV: production

    - name: Display npm ci logs
      ansible.builtin.debug:
        msg:
          - "npm ci return code: {{ npm_ci_result.rc }}"
          - "npm ci STDOUT:"
          - "{{ npm_ci_result.stdout_lines | default([]) }}"
          - "npm ci STDERR:"
          - "{{ npm_ci_result.stderr_lines | default([]) }}"

    - name: Fail when npm ci fails
      ansible.builtin.assert:
        that:
          - npm_ci_result.rc == 0
        fail_msg: "npm ci failed. Review the npm logs printed above."
        success_msg: "Frontend dependencies installed successfully."

    - name: Build frontend application
      ansible.builtin.command:
        cmd: npm run build
        chdir: "{{ frontend_build_dir }}"
      register: npm_build_result
      changed_when: npm_build_result.rc == 0
      failed_when: false

    - name: Display frontend build logs
      ansible.builtin.debug:
        msg:
          - "npm build return code: {{ npm_build_result.rc }}"
          - "npm build STDOUT:"
          - "{{ npm_build_result.stdout_lines | default([]) }}"
          - "npm build STDERR:"
          - "{{ npm_build_result.stderr_lines | default([]) }}"

    - name: Fail when frontend build fails
      ansible.builtin.assert:
        that:
          - npm_build_result.rc == 0
        fail_msg: "Frontend build failed. Review the build logs printed above."
        success_msg: "Frontend application built successfully."

    - name: Verify frontend dist directory exists
      ansible.builtin.stat:
        path: "{{ frontend_build_dir }}/dist"
      register: frontend_dist

    - name: Fail when frontend dist directory is missing
      ansible.builtin.assert:
        that:
          - frontend_dist.stat.exists
          - frontend_dist.stat.isdir
        fail_msg: >-
          The build completed but {{ frontend_build_dir }}/dist
          was not created.
        success_msg: "Frontend dist directory found."

    # ============================================================
    # Deploy frontend files
    # ============================================================

    - name: Remove existing Nginx document root
      ansible.builtin.file:
        path: "{{ nginx_document_root }}"
        state: absent

    - name: Recreate Nginx document root
      ansible.builtin.file:
        path: "{{ nginx_document_root }}"
        state: directory
        owner: nginx
        group: nginx
        mode: "0755"

    - name: Copy built frontend files to Nginx document root
      ansible.builtin.copy:
        src: "{{ frontend_build_dir }}/dist/"
        dest: "{{ nginx_document_root }}/"
        remote_src: true
        owner: nginx
        group: nginx
        mode: preserve
      register: frontend_copy_result

    - name: Display frontend deployment result
      ansible.builtin.debug:
        msg:
          - "Frontend files changed: {{ frontend_copy_result.changed }}"
          - "Deployment location: {{ nginx_document_root }}"

    - name: List deployed frontend files
      ansible.builtin.command:
        cmd: "find {{ nginx_document_root }} -maxdepth 2 -type f"
      register: deployed_files
      changed_when: false
      failed_when: false

    - name: Display deployed frontend files
      ansible.builtin.debug:
        var: deployed_files.stdout_lines

    # ============================================================
    # Nginx configuration
    # ============================================================

    - name: Copy Nginx virtual host configuration
      ansible.builtin.copy:
        src: "{{ nginx_local_config }}"
        dest: "{{ nginx_config_destination }}"
        owner: root
        group: root
        mode: "0644"
        backup: true
      register: nginx_config_copy

    - name: Display Nginx configuration copy result
      ansible.builtin.debug:
        msg:
          - "Nginx configuration changed: {{ nginx_config_copy.changed }}"
          - "Configuration destination: {{ nginx_config_destination }}"
          - "Backup file: {{ nginx_config_copy.backup_file | default('Not created') }}"

    - name: Validate Nginx configuration
      ansible.builtin.command:
        cmd: nginx -t
      register: nginx_config_test
      changed_when: false
      failed_when: false

    - name: Display Nginx configuration validation logs
      ansible.builtin.debug:
        msg:
          - "Nginx configuration return code: {{ nginx_config_test.rc }}"
          - "STDOUT:"
          - "{{ nginx_config_test.stdout_lines | default([]) }}"
          - "STDERR:"
          - "{{ nginx_config_test.stderr_lines | default([]) }}"

    - name: Fail when Nginx configuration is invalid
      ansible.builtin.assert:
        that:
          - nginx_config_test.rc == 0
        fail_msg: >-
          Nginx configuration validation failed.
          Check {{ nginx_config_destination }} and review the
          nginx -t output printed above.
        success_msg: "Nginx configuration validation passed."

    # ============================================================
    # Start Nginx and capture failure logs
    # ============================================================

    - name: Start Nginx with automatic error-log collection
      block:
        - name: Start and enable Nginx
          ansible.builtin.systemd_service:
            name: nginx
            state: restarted
            enabled: true
            daemon_reload: true
          register: nginx_service_result

        - name: Display Nginx systemd result
          ansible.builtin.debug:
            msg:
              - "Nginx service changed: {{ nginx_service_result.changed }}"
              - "Active state: {{ nginx_service_result.status.ActiveState | default('unknown') }}"
              - "Substate: {{ nginx_service_result.status.SubState | default('unknown') }}"
              - "Boot status: {{ nginx_service_result.status.UnitFileState | default('unknown') }}"

      rescue:
        - name: Collect Nginx configuration failure output
          ansible.builtin.command:
            cmd: nginx -t
          register: nginx_failure_config
          changed_when: false
          failed_when: false

        - name: Collect Nginx service status after failure
          ansible.builtin.command:
            cmd: systemctl status nginx --no-pager --full
          register: nginx_failure_status
          changed_when: false
          failed_when: false

        - name: Collect recent Nginx journal logs after failure
          ansible.builtin.command:
            cmd: journalctl -u nginx.service -n 100 --no-pager
          register: nginx_failure_journal
          changed_when: false
          failed_when: false

        - name: Check processes using ports 80 and 443
          ansible.builtin.shell: |
            ss -lntp | grep -E ':(80|443)([[:space:]]|$)' || true
          args:
            executable: /bin/bash
          register: nginx_port_usage
          changed_when: false
          failed_when: false

        - name: Display Nginx startup failure details
          ansible.builtin.debug:
            msg:
              - "================ NGINX CONFIG TEST ================"
              - "{{ nginx_failure_config.stdout_lines | default([]) }}"
              - "{{ nginx_failure_config.stderr_lines | default([]) }}"
              - "================ SYSTEMD STATUS ==================="
              - "{{ nginx_failure_status.stdout_lines | default([]) }}"
              - "{{ nginx_failure_status.stderr_lines | default([]) }}"
              - "================ JOURNAL LOGS ====================="
              - "{{ nginx_failure_journal.stdout_lines | default([]) }}"
              - "================ PORT 80/443 USAGE ================"
              - "{{ nginx_port_usage.stdout_lines | default([]) }}"

        - name: Stop play because Nginx failed to start
          ansible.builtin.fail:
            msg: >-
              Nginx failed to start. The configuration test,
              systemd status, journal logs, and port usage were
              printed above.

    # ============================================================
    # Final verification and logs
    # ============================================================

    - name: Check whether Nginx is active
      ansible.builtin.command:
        cmd: systemctl is-active nginx
      register: nginx_active
      changed_when: false
      failed_when: false

    - name: Check whether Nginx is enabled
      ansible.builtin.command:
        cmd: systemctl is-enabled nginx
      register: nginx_enabled
      changed_when: false
      failed_when: false

    - name: Collect detailed Nginx status
      ansible.builtin.command:
        cmd: systemctl status nginx --no-pager --full
      register: nginx_status
      changed_when: false
      failed_when: false

    - name: Collect recent Nginx journal logs
      ansible.builtin.command:
        cmd: journalctl -u nginx.service -n 50 --no-pager
      register: nginx_journal
      changed_when: false
      failed_when: false

    - name: Test frontend locally through Nginx
      ansible.builtin.uri:
        url: "http://127.0.0.1"
        method: GET
        status_code:
          - 200
          - 301
          - 302
        return_content: false
      register: frontend_http_test
      retries: 5
      delay: 3
      until: frontend_http_test.status in [200, 301, 302]

    - name: Display final Nginx deployment status
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "Frontend deployment completed successfully"
          - "Nginx active status: {{ nginx_active.stdout }}"
          - "Nginx boot status: {{ nginx_enabled.stdout }}"
          - "HTTP response status: {{ frontend_http_test.status }}"
          - "Frontend directory: {{ nginx_document_root }}"
          - "Nginx configuration: {{ nginx_config_destination }}"
          - "=============================================="

    - name: Display detailed Nginx service status
      ansible.builtin.debug:
        var: nginx_status.stdout_lines

    - name: Display recent Nginx journal logs
      ansible.builtin.debug:
        var: nginx_journal.stdout_lines